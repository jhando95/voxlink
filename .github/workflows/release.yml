name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: windows-cargo-

      - name: Build release binaries
        run: cargo build --release

      - name: Download VC++ Redistributable
        run: |
          New-Item -ItemType Directory -Force -Path installer\redist | Out-Null
          Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vc_redist.x64.exe" -OutFile "installer\redist\vc_redist.x64.exe" -UseBasicParsing

      - name: Install Inno Setup
        run: |
          choco install innosetup -y --no-progress
        shell: cmd

      - name: Build installer
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DMyAppVersion=$version" installer\voxlink.iss
        shell: pwsh

      - name: Sign binaries
        if: env.CODESIGN_PFX != ''
        env:
          CODESIGN_PFX: ${{ secrets.CODESIGN_PFX }}
          CODESIGN_PASSWORD: ${{ secrets.CODESIGN_PASSWORD }}
        run: |
          # Decode the base64-encoded PFX certificate
          $pfxBytes = [Convert]::FromBase64String($env:CODESIGN_PFX)
          $pfxPath = "$env:RUNNER_TEMP\codesign.pfx"
          [IO.File]::WriteAllBytes($pfxPath, $pfxBytes)

          # Find signtool
          $signtool = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits" -Recurse -Filter "signtool.exe" | Where-Object { $_.FullName -match "x64" } | Select-Object -First 1
          if (-not $signtool) {
            Write-Error "signtool.exe not found"
            exit 1
          }

          # Sign both binaries
          & $signtool.FullName sign /f $pfxPath /p $env:CODESIGN_PASSWORD /tr http://timestamp.digicert.com /td sha256 /fd sha256 /d "Voxlink" "target\release\app_desktop.exe"
          & $signtool.FullName sign /f $pfxPath /p $env:CODESIGN_PASSWORD /tr http://timestamp.digicert.com /td sha256 /fd sha256 /d "Voxlink Server" "target\release\signaling_server.exe"

          # Clean up
          Remove-Item $pfxPath -Force
          Write-Host "Binaries signed successfully"
        shell: pwsh

      - name: Create portable zip
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          $outDir = "target\Voxlink-$version"
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null
          Copy-Item "target\release\app_desktop.exe" "$outDir\Voxlink.exe"
          Copy-Item "target\release\signaling_server.exe" "$outDir\Voxlink-Server.exe"
          @"
          Voxlink $version
          ===================

          Voxlink.exe        - Run this to start the app
          Voxlink-Server.exe - Run this to host a server for your group

          Quick Start:
          1. One person runs Voxlink-Server.exe
          2. Everyone runs Voxlink.exe
          3. Enter the server host's IP as: ws://<ip>:9090
          4. Click Connect, then Create or Join a room

          The server also works on the same PC as the app.
          For local testing, use: ws://127.0.0.1:9090
          "@ | Out-File -Encoding UTF8 "$outDir\README.txt"
          Compress-Archive -Path $outDir -DestinationPath "target\Voxlink-$version-portable.zip" -Force
        shell: pwsh

      - name: Sign installer
        if: env.CODESIGN_PFX != ''
        env:
          CODESIGN_PFX: ${{ secrets.CODESIGN_PFX }}
          CODESIGN_PASSWORD: ${{ secrets.CODESIGN_PASSWORD }}
        run: |
          $pfxBytes = [Convert]::FromBase64String($env:CODESIGN_PFX)
          $pfxPath = "$env:RUNNER_TEMP\codesign.pfx"
          [IO.File]::WriteAllBytes($pfxPath, $pfxBytes)

          $signtool = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits" -Recurse -Filter "signtool.exe" | Where-Object { $_.FullName -match "x64" } | Select-Object -First 1
          $version = "${{ github.ref_name }}".TrimStart("v")
          $installer = "target\installer\Voxlink-Setup-$version.exe"

          & $signtool.FullName sign /f $pfxPath /p $env:CODESIGN_PASSWORD /tr http://timestamp.digicert.com /td sha256 /fd sha256 /d "Voxlink Setup" $installer

          Remove-Item $pfxPath -Force
          Write-Host "Installer signed successfully"
        shell: pwsh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: |
            target/installer/Voxlink-Setup-*.exe
            target/Voxlink-*-portable.zip

  release:
    needs: build-windows
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: release-files

      - name: List files
        run: find release-files -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Voxlink ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release-files/installer/Voxlink-Setup-*.exe
            release-files/Voxlink-*-portable.zip
          body: |
            ## Download

            **Windows Installer** — Download `Voxlink-Setup-*.exe`, run it, done.
            Includes VC++ Runtime, creates Start Menu shortcut, optional desktop icon.

            **Portable** — Download `Voxlink-*-portable.zip`, extract anywhere, run `Voxlink.exe`.
            No installation needed.

            ## Connect

            The public server is already running. Just launch Voxlink and connect.
            Server address: `ws://129.158.231.26:9090`
