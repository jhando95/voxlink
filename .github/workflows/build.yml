name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system deps (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libdbus-1-dev libfontconfig1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libx11-dev libpipewire-0.3-dev pkg-config

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: linux-cargo-

      - name: Check
        run: cargo check --workspace

      - name: Build server (needed by integration tests)
        run: cargo build -p signaling_server

      - name: Test workspace
        run: cargo test --workspace --exclude ui_shell

      - name: Test UI shell layout guards
        run: cargo test -p ui_shell --test ui_visibility_layout

      - name: Capture UI visibility snapshots
        env:
          VOXLINK_UI_WRITE_SNAPSHOTS: 1
        run: cargo test -p ui_shell --test ui_visibility_snapshots snapshot_matrix_covers_key_views_in_narrow_and_wide_layouts -- --exact

      - name: Upload UI visibility snapshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-visibility-snapshots
          path: target/ui_visibility_snapshots/*.png
          if-no-files-found: warn

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Benchmarks (dry run)
        run: cargo bench --workspace --no-run

  build-matrix:
    name: Build (${{ matrix.name }})
    needs: check
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: windows-x86_64
          - name: macOS x86_64
            os: macos-latest
            target: x86_64-apple-darwin
            artifact: macos-x86_64
          - name: macOS aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            artifact: macos-aarch64
          - name: Linux x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: linux-x86_64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libdbus-1-dev libfontconfig1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libx11-dev libpipewire-0.3-dev pkg-config

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.artifact }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ matrix.artifact }}-cargo-

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            target/${{ matrix.target }}/release/app_desktop*
            target/${{ matrix.target }}/release/signaling_server*
            !target/${{ matrix.target }}/release/*.d
            !target/${{ matrix.target }}/release/*.pdb
